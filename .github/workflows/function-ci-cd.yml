name: LeiMonitor.Function — CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'src/LeiMonitor.Core/**'
      - 'src/LeiMonitor.Data/**'
      - 'src/LeiMonitor.Function/**'
      - '.github/workflows/function-ci-cd.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'src/LeiMonitor.Core/**'
      - 'src/LeiMonitor.Data/**'
      - 'src/LeiMonitor.Function/**'
      - '.github/workflows/function-ci-cd.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC login
  contents: read    # required for actions/checkout

env:
  DOTNET_VERSION: '9.0.x'
  FUNCTION_PROJECT: 'src/LeiMonitor.Function/LeiMonitor.Function.csproj'
  PUBLISH_DIR: '${{ github.workspace }}/publish/function'

jobs:
  # ---------------------------------------------------------------
  # Job 1: build — runs on every push and every PR
  # ---------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.FUNCTION_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.FUNCTION_PROJECT }} --configuration Release --no-restore

  # ---------------------------------------------------------------
  # Job 2: publish and deploy — runs only on push to master
  # ---------------------------------------------------------------
  deploy:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish ${{ env.FUNCTION_PROJECT }}
          --configuration Release
          --output ${{ env.PUBLISH_DIR }}
          --no-self-contained

      - name: Zip publish output
        run: |
          cd ${{ env.PUBLISH_DIR }}
          zip -r ${{ github.workspace }}/publish/function.zip .

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip to Function App
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az functionapp deployment source config-zip \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_FUNCTION_APP_NAME }} \
              --src ${{ github.workspace }}/publish/function.zip
