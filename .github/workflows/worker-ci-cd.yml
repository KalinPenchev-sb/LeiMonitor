name: LeiMonitor.Worker — CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'src/LeiMonitor.Core/**'
      - 'src/LeiMonitor.Data/**'
      - 'src/LeiMonitor.Worker/**'
      - 'Dockerfile'
      - '.github/workflows/worker-ci-cd.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC login
  contents: read    # required for actions/checkout

env:
  ACR_NAME:    acrleimonitodev
  AKS_CLUSTER: aks-lei-monitor-dev
  AKS_RG:      rg-lei-monitor-dev
  IMAGE_NAME:  lei-monitor

jobs:
  # ---------------------------------------------------------------
  # Job 1: build — validates the Docker image builds on every push
  # ---------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

  # ---------------------------------------------------------------
  # Job 2: deploy — push to ACR and update AKS (master only)
  # ---------------------------------------------------------------
  deploy:
    name: Push & Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build \
            --tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RG }} \
            --name           ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Update CronJob image on AKS
        run: |
          kubectl set image cronjob/lei-expiry-check \
            lei-monitor=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --namespace lei-monitor
